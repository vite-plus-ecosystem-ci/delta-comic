[package]
name = "delta-comic"
description = "Per Aspera, Ad Astra"
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lib]
name = "delta_comic"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tauri = { workspace = true }
tauri-plugin-aptabase = { workspace = true }
tauri-plugin-better-cors-fetch = { workspace = true }
tauri-plugin-clipboard-manager = { workspace = true }
tauri-plugin-db = { workspace = true }
tauri-plugin-fs = { workspace = true }
# Keep direct so Tauri discovers log:* permissions used by capabilities/default.json.
tauri-plugin-log = { workspace = true }
tauri-plugin-m3 = { workspace = true }
tauri-plugin-persisted-scope = { workspace = true }
tauri-plugin-plugin = { workspace = true }
tauri-plugin-shell = { workspace = true }
# Keep direct so Tauri discovers sql:* permissions used by capabilities/default.json.
tauri-plugin-sql = { workspace = true }
tauri-plugin-utils = { workspace = true }
tokio = { workspace = true }

[build-dependencies.tauri-build]
workspace = true

[features]
default = []
custom-protocol = ["tauri/custom-protocol"]