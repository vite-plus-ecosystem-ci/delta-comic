name: 构建和发布

on:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    if: ${{ contains(github.event.head_commit.message, '[pub]') }}
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - run: vp install
      - run: vp check

      - name: JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          log-accepted-android-sdk-licenses: false

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1.5.0
        id: setup-ndk
        with:
          ndk-version: r29
          link-to-sdk: true
          local-cache: true
          add-to-path: true

      - name: Init android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

          cd packages/app
          pnpm exec tauri android init

      - name: Change version
        id: set-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_DUR_RUN: true
        run: |
          OLD_VERSION="$(node ./script/update-version.mts)"
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          vp run lib-build
          vp run pub:all || echo "no need to publish"

      - name: Make gradlew executable
        run: chmod +x ./packages/app/src-tauri/gen/android/gradlew

      - name: Build Android App
        id: build
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          mobile: 'android'
          args: ''
          retryAttempts: 0
          projectPath: packages/app

      - name: Restore version
        run: |
          node ./script/set-version.mts ${{ steps.set-version.outputs.old_version }}

      - name: Restore keystore (decode + verify)
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP"

          printf '%s' "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.p12"

          ls -l "$RUNNER_TEMP/keystore.p12"
          FILESIZE=$(stat --format="%s" "$RUNNER_TEMP/keystore.p12" || echo 0)
          echo "keystore size: $FILESIZE"
          if [ "$FILESIZE" -lt 1000 ]; then
            echo "ERROR: keystore seems too small ($FILESIZE bytes). Did you upload the correct base64 content?" >&2
            exit 1
          fi

          cd packages/app/src-tauri/gen/android || true
          printf 'storeFile=%s\n' "$RUNNER_TEMP/keystore.p12" > keystore.properties
          printf 'storePassword=%s\n' "$KEYSTORE_PASS" >> keystore.properties
          printf 'keyPassword=%s\n' "$KEYSTORE_PASS" >> keystore.properties
          printf 'keyAlias=%s\n' "${{ secrets.ANDROID_KEY_ALIAS }}" >> keystore.properties

      - name: Install apksigner
        run: sudo apt-get update && sudo apt-get install -y apksigner

      - name: Sign APK
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          APK_SRC="./packages/app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          if [ ! -f "$APK_SRC" ]; then
            echo "APK not found at $APK_SRC" >&2
            exit 1
          fi
          mkdir -p dist

          apksigner sign \
            --ks "$RUNNER_TEMP/keystore.p12" \
            --ks-type PKCS12 \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEYSTORE_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out ./dist/app.apk \
            "$APK_SRC"

          echo '-----------'
          ls -la ./dist

      - name: Configure git author
        run: |
          git config user.name "delta-comic-bot"
          git config user.email "delta-comic-bot@proton.me"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vp exec semantic-release || pnpm exec semantic-release