name: 发布到 npm 和 GitHub Packages

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (不实际发布)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - 'main'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    if: ${{ contains(github.event.head_commit.message, '[pub]') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 25
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: vp run npm-build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          vp pm publish -r --no-git-checks || pnpm publish -r --no-git-checks || echo "no packages to publish to npm"

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure npmrc for GitHub Packages
          echo "@delta-comic:registry=https://npm.pkg.github.com/" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          
          # Publish each package to GitHub Packages
          for pkg in packages/core packages/db packages/model packages/plugin packages/request packages/ui packages/utils packages/vite; do
            if [ -f "$pkg/package.json" ]; then
              name=$(node -p "require('./$pkg/package.json').name")
              private=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$private" = "true" ]; then
                echo "Skipping private package: $name"
                continue
              fi
              echo "Publishing $name to GitHub Packages..."
              cd "$pkg"
              pnpm publish --no-git-checks || echo "Failed to publish $name (may already exist)"
              cd ../..
            fi
          done

      - name: Configure git author
        run: |
          git config user.name "delta-comic-bot"
          git config user.email "delta-comic-bot@proton.me"

      - name: Run semantic-release
        if: ${{ !inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vp exec semantic-release || pnpm exec semantic-release
